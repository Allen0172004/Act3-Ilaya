<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bootstrap Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #f6d365, #fda085);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .calendar {
      width: 350px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .calendar-header {
      background: #6ec1c8;
      color: white;
      padding: 10px;
      text-align: center;
      position: relative;
    }

    .calendar-header button {
      position: absolute;
      top: 10px;
      background: transparent;
      border: none;
      color: white;
      font-size: 18px;
    }

    .prev {
      left: 10px;
    }

    .next {
      right: 10px;
    }

    .calendar-body {
      padding: 10px;
    }

    .calendar-body .day-name,
    .calendar-body .day {
      text-align: center;
      padding: 8px;
    }

    .day-name {
      font-weight: bold;
      color: #777;
    }

    .day {
      border: 1px solid #eee;
      margin: -1px;
    }

    .day:hover {
      background: #f1f1f1;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="calendar">
  <div class="calendar-header">
    <button class="prev">&#10094;</button>
    <h5>September 2026</h5>
    <button class="next">&#10095;</button>
  </div>

  <div class="calendar-body">
    <!-- Days of Week -->
    <div class="row text-center">
      <div class="col day-name">Mon</div>
      <div class="col day-name">Tue</div>
      <div class="col day-name">Wed</div>
      <div class="col day-name">Thu</div>
      <div class="col day-name">Fri</div>
      <div class="col day-name">Sat</div>
      <div class="col day-name">Sun</div>
    </div>

    <!-- Dates -->
    <div class="row">
      <div class="col day text-muted">30</div>
      <div class="col day text-muted">31</div>
      <div class="col day">1</div>
      <div class="col day">2</div>
      <div class="col day">3</div>
      <div class="col day">4</div>
      <div class="col day">5</div>
    </div>

    <div class="row">
      <div class="col day">6</div>
      <div class="col day">7</div>
      <div class="col day">8</div>
      <div class="col day">9</div>
      <div class="col day">10</div>
      <div class="col day">11</div>
      <div class="col day">12</div>
    </div>

    <div class="row">
      <div class="col day">13</div>
      <div class="col day">14</div>
      <div class="col day">15</div>
      <div class="col day">16</div>
      <div class="col day">17</div>
      <div class="col day">18</div>
      <div class="col day">19</div>
    </div>

    <div class="row">
      <div class="col day">20</div>
      <div class="col day">21</div>
      <div class="col day">22</div>
      <div class="col day">23</div>
      <div class="col day">24</div>
      <div class="col day">25</div>
      <div class="col day">26</div>
    </div>

    <div class="row">
      <div class="col day">27</div>
      <div class="col day">28</div>
      <div class="col day">29</div>
      <div class="col day">30</div>
      <div class="col day text-muted">1</div>
      <div class="col day text-muted">2</div>
      <div class="col day text-muted">3</div>
    </div>
  </div>
</div>

</body>
</html>
